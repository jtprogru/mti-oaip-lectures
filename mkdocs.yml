site_name: Основы алгоритмизации и программирования
site_description: Материалы курса «Основы алгоритмизации и программирования» (МТИ, ОАиП)
site_url: https://jtprogru.github.io/mti-oaip-lectures/
repo_url: https://github.com/jtprogru/mti-oaip-lectures
repo_name: jtprogru/mti-oaip-lectures
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: ru
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Светлая тема

plugins:
  - search:
      lang:
        - ru
        - en
  - mermaid2
  - git-revision-date-localized:
      type: iso_date
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Главная: index.md
  - Темы:
      - "Тема 1. Алгоритмизация":
          - topics/01-algorithm-basics/index.md
          - "Лекция 1. Основные понятия": topics/01-algorithm-basics/lecture-01-basics.md
          - "Лекция 2. Алгоритмические конструкции": topics/01-algorithm-basics/lecture-02-constructs.md
          - "Лекции 3–4. Логические основы": topics/01-algorithm-basics/lecture-03-logic.md
      - "Тема 2. Языки и методы":
          - topics/02-languages-and-methods/index.md
          - "Лекция 1. Языки и системы программирования": topics/02-languages-and-methods/lecture-01-languages.md
          - "Лекция 2. Методы программирования и SDLC": topics/02-languages-and-methods/lecture-02-methods.md
      - "Тема 3. Python — основы": topics/03-python-basics/index.md
      - "Тема 4. Процедуры и файлы": topics/04-procedures-and-files/index.md
      - "Тема 5. Библиотеки и модули": topics/05-libraries-and-modules/index.md
      - "Тема 6. ООП":
          - topics/06-oop-principles/index.md
          - "Лекция 1. Базовые понятия ООП": topics/06-oop-principles/lecture-01-oop-basics.md
          - "Лекция 2. Событийная модель и компоненты": topics/06-oop-principles/lecture-02-event-driven.md
      - "Тема 7. VS Code":
          - topics/07-ide-vscode/index.md
          - "Лекция 1. VS Code: установка и настройка": topics/07-ide-vscode/lecture-01-setup.md
          - "Лекция 2. Параметры командной строки": topics/07-ide-vscode/lecture-02-cli-args.md
          - "Лекция 3. Ошибки, исключения, декораторы": topics/07-ide-vscode/lecture-03-errors-decorators.md
      - "Тема 8. Этапы разработки":
          - topics/08-app-development-stages/index.md
          - "Лекция 1. GUI на Tkinter": topics/08-app-development-stages/lecture-01-tkinter.md
          - "Лекция 2. GUI на PyQt и Qt Designer": topics/08-app-development-stages/lecture-02-pyqt.md
          - "Лекция 3. Web-обёртка как UI": topics/08-app-development-stages/lecture-03-web-ui.md
      - "Тема 9. Иерархия классов":
          - topics/09-class-hierarchies/index.md
          - "Лекция 1. Стандартная библиотека": topics/09-class-hierarchies/lecture-01-stdlib.md
          - "Лекция 2. Шаблоны проектирования": topics/09-class-hierarchies/lecture-02-patterns.md
      - "Тема 10. Стандартные модули":
          - topics/10-standard-modules/index.md
          - "Лекция 1. HTTP-клиент и HTTP-сервер": topics/10-standard-modules/lecture-01-http.md
          - "Лекция 2. Регулярные выражения": topics/10-standard-modules/lecture-02-regex.md
          - "Лекция 3. SQLite": topics/10-standard-modules/lecture-03-sqlite.md
          - "Лекция 4. Конкурентность и потоки": topics/10-standard-modules/lecture-04-concurrency.md
      - "Тема 11. Разработка приложений":
          - topics/11-application-development/index.md
          - "Лекция 1. Логирование": topics/11-application-development/lecture-01-logging.md
      - "Тема 12. Качество кода":
          - topics/12-code-quality-and-testing/index.md
          - "Лекция 1. Тестирование": topics/12-code-quality-and-testing/lecture-01-testing.md
      - "Тема 13. Go — основы": topics/13-golang-basics/index.md
      - "Тема 14. Go — продвинутый": topics/14-golang-advanced/index.md
  - Лабораторные: labs/index.md
  - Практика: practice/index.md
  - Билеты: tickets/index.md
