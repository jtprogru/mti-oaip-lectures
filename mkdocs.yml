site_name: Основы алгоритмизации и программирования
site_description: Материалы курса «Основы алгоритмизации и программирования» (МТИ, ОАиП)
site_url: https://jtprogru.github.io/mti-oaip-lectures/
repo_url: https://github.com/jtprogru/mti-oaip-lectures
repo_name: jtprogru/mti-oaip-lectures
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: ru
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Светлая тема

plugins:
  - search:
      lang:
        - ru
        - en
  - mermaid2
  - git-revision-date-localized:
      type: iso_date
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Главная: index.md
  - Темы:
      - "Тема 1. Алгоритмизация":
          - topics/01-algorithm-basics/index.md
          - "Лекция 1. Основные понятия": topics/01-algorithm-basics/lecture-01-basics.md
          - "Лекция 2. Алгоритмические конструкции": topics/01-algorithm-basics/lecture-02-constructs.md
          - "Лекции 3–4. Логические основы": topics/01-algorithm-basics/lecture-03-logic.md
      - "Тема 2. Языки и методы":
          - topics/02-languages-and-methods/index.md
          - "Лекция 1. Языки и системы программирования": topics/02-languages-and-methods/lecture-01-languages.md
          - "Лекция 2. Методы программирования и SDLC": topics/02-languages-and-methods/lecture-02-methods.md
      - "Тема 3. Python — основы":
          - topics/03-python-basics/index.md
          - "Лекция 1. Синтаксис и типы данных": topics/03-python-basics/lecture-01-syntax-types.md
          - "Лекция 2. Управляющие конструкции и I/O": topics/03-python-basics/lecture-02-control-flow-io.md
          - "Лекция 3. Коллекции": topics/03-python-basics/lecture-03-collections.md
          - "Лекция 4. Кодировки, байты, машинное представление": topics/03-python-basics/lecture-04-encodings-bytes.md
      - "Тема 4. Процедуры и файлы":
