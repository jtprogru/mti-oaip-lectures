          - "Лекция 1. Функции и область видимости": topics/04-procedures-and-files/lecture-01-functions.md
          - "Лекция 2. Строки и рекурсия": topics/04-procedures-and-files/lecture-02-strings-recursion.md
          - "Лекция 3. Работа с файлами": topics/04-procedures-and-files/lecture-03-files.md
          - "Лекция 4. Бинарные файлы и произвольный доступ": topics/04-procedures-and-files/lecture-04-binary-random-access.md
      - "Тема 5. Библиотеки и модули":
